name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vault
          POSTGRES_PASSWORD: vault
          POSTGRES_DB: vault
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vault"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      # -p 1: test packages share one database and recreate their schemas
      - run: go test -race -p 1 ./...
        env:
          TEST_DATABASE_URL: postgres://vault:vault@localhost:5432/vault

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: build
        run: |
          if [ -f web/package.json ]; then
            cd web && npm ci && npm run build
          else
            echo "web not scaffolded yet"
          fi

  assist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r assist/requirements.txt pytest
      - run: python -m pytest assist/tests -q
