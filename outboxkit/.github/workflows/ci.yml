name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: obk
          POSTGRES_PASSWORD: obk
          POSTGRES_DB: obk
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U obk"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test -race ./...
        env:
          TEST_DATABASE_URL: postgres://obk:obk@localhost:5432/obk
